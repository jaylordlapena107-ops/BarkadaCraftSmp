<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarkadaClash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  <h1>BarkadaClash <span>v2.9</span></h1>

  <div class="nav">
    <button class="active">Home</button>
    <button>Shop</button>
    <button>GameChat</button>
    <button>Profile</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>BARKADA CLASH</h2>
      <span id="status" class="offline">• SERVER OFFLINE</span>
    </div>

    <div class="grid">
      <div class="box">👤<br><span id="players">0/0</span></div>
      <div class="box">⚡ TPS<br><span id="tps">0</span></div>
      <div class="box">💻 CPU<br><span id="cpu">0</span></div>
      <div class="box">🧠 RAM<br><span id="ram">0</span></div>
      <div class="box">🔥 Nether<br><span id="nether">OFF</span></div>
      <div class="box">🌌 End<br><span id="end">OFF</span></div>
    </div>
  </div>

  <div class="buttons">
    <button class="full">▶ Join Server</button>
    <button>📜 Rules</button>
    <button>💬 Community Chat</button>

    <button class="discord" onclick="window.open('https://discord.gg/F7pDytk8ma')">
      💙 Discord
    </button>

    <button class="messenger" onclick="window.open('https://m.me/j/AbZt09H0JEIoi1v6/?send_source=gc%3Acopy_invite_link_c')">
      📩 Messenger GC
    </button>
  </div>

</div>

<!-- CONNECT SA SCRIPT -->
<script src="script.js"></script>

</body>
</html>
